name: veil_note
description: VeilNote - Discreet Emergency Alert & Evidence Recording
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  provider: ^6.0.0
  flutter_dotenv: ^5.1.0
  geolocator: ^9.0.0
  record: ^5.0.4
  path_provider: ^2.1.0
  permission_handler: ^11.4.0
  vibration: ^3.1.8
  flutter_secure_storage: ^10.0.0
  audioplayers: ^5.0.0
  url_launcher: ^6.3.2

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/veil_note_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/veil_note_logo.png
